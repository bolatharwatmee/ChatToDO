name: ChatToDO bot

# Runs the Telegram bot on a GitHub Actions runner (free, open internet).
# A run lasts up to ~6 hours; the schedule below relaunches it so it stays
# near-24/7. Telegram queues messages during the brief restart gap, and the
# bot fires any reminders that came due while it was restarting.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *" # relaunch roughly every 5 hours

concurrency:
  group: chattodo-bot
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore saved tasks
        uses: actions/cache/restore@v4
        with:
          path: data
          key: chattodo-data-${{ github.run_id }}
          restore-keys: |
            chattodo-data-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TZ: Africa/Cairo
          DEFAULT_REMINDER_TIME: "09:00"
        # Exit a bit before the job timeout so the save step below always runs.
        run: timeout 345m node src/index.js || true

      - name: Save tasks
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: chattodo-data-${{ github.run_id }}
