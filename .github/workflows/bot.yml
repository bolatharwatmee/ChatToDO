name: ChatToDO bot

# Runs the WhatsApp bot on a GitHub Actions runner (which has open internet,
# unlike sandboxed dev environments). Link once with a phone pairing code; the
# WhatsApp session is cached so later runs reconnect without re-linking.
#
# NOTE: a single run lasts at most ~6 hours (GitHub's job limit). For true 24/7
# uptime, host it on an always-on machine/VPS (see README). This workflow is the
# zero-setup way to get it talking to WhatsApp from your phone alone.

on:
  workflow_dispatch:
    inputs:
      phone:
        description: "Your WhatsApp number, digits only incl. country code (e.g. 201273533815)"
        required: true
      minutes:
        description: "How long to keep the bot running (max 350)"
        required: false
        default: "350"

concurrency:
  group: chattodo-bot
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 358
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore WhatsApp session
        uses: actions/cache/restore@v4
        with:
          path: data
          key: chattodo-v2-auth-${{ github.run_id }}
          restore-keys: |
            chattodo-v2-auth-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run bot
        env:
          OWNER_NUMBER: ${{ inputs.phone }}
          PAIRING_NUMBER: ${{ inputs.phone }}
          TZ: Africa/Cairo
          DEFAULT_REMINDER_TIME: "09:00"
          # Optional: add a repo secret named GROQ_API_KEY to enable voice notes.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set +e
          : > /tmp/bot.log

          # Publisher: mirror the pairing code (and link status) to the
          # "bot-link" branch so it can be read live while the bot keeps running.
          git config user.email "bot@users.noreply.github.com"
          git config user.name "ChatToDO bot"
          (
            published=""
            for i in $(seq 1 360); do
              if grep -q 'ChatToDO is live' /tmp/bot.log; then
                msg="STATUS=LINKED"
              else
                code=$(grep -ao 'PAIRING_CODE=[A-Z0-9-]\+' /tmp/bot.log | tail -1 | cut -d= -f2)
                [ -z "$code" ] && { sleep 5; continue; }
                msg="PAIRING_CODE=$code"
              fi
              if [ "$msg" != "$published" ]; then
                published="$msg"
                printf '%s\n' "$msg" > LINK_CODE.txt
                git add LINK_CODE.txt
                git commit -q -m "link status" >/dev/null 2>&1
                git push -f -q origin HEAD:bot-link >/dev/null 2>&1
              fi
              echo "$msg" | grep -q LINKED && break
              sleep 5
            done
          ) &

          timeout ${{ inputs.minutes }}m node src/index.js 2>&1 | tee /tmp/bot.log
          true

      - name: Save WhatsApp session
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: chattodo-v2-auth-${{ github.run_id }}
